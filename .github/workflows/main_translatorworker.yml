name: deploy-worker (Linux App Service - SP Secret)

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - "worker/**"
      - "requirements-worker.txt"
      - "requirements.txt"
      - ".github/workflows/main_translatorworker.yml"

permissions:
  contents: read   # tidak perlu id-token untuk mode secret (creds JSON)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install worker dependencies (sanity)
      run: |
        set -e
        if [ -f requirements-worker.txt ]; then
          pip install -r requirements-worker.txt
        elif [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          echo "No requirements file found, skipping pip install"
        fi

    # (opsional tapi membantu debug) kemas repo jadi ZIP agar isi paket jelas
    - name: Create deployment zip
      run: |
        set -e
        zip -r worker_deploy.zip . -x "**/.git/**" "**/__pycache__/**" "**/.venv/**" "*.DS_Store"
        echo "=== ZIP CONTENTS (first 200 lines) ==="
        unzip -l worker_deploy.zip | head -n 200
        # pastikan file entry-point ikut:
        test -f worker/worker.py && echo "[OK] found worker/worker.py" || (echo "[FAIL] worker/worker.py not found in repo!" && exit 1)

    # ====== LOGIN AZURE (harus sebelum deploy) ======
    # Gunakan secret AZURE_CREDENTIALS (JSON camelCase: clientId, clientSecret, tenantId, subscriptionId)
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # ====== DEPLOY ======
    - name: Deploy to Azure Web App (worker)
      uses: azure/webapps-deploy@v3
      with:
        app-name: "KID-Worker"          # <-- ganti bila nama App Service berbeda
        package: "worker_deploy.zip"
