name: deploy-worker (Linux App Service)

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - "worker/**"
      - "requirements-worker.txt"
      - "requirements.txt"
      - ".github/workflows/main_translatorworker.yml"
      # opsional:
      - "app/**"
      - "webjob/translator-worker/**"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install worker dependencies (sanity)
      run: |
        set -e
        if [ -f requirements-worker.txt ]; then
          pip install -r requirements-worker.txt
        elif [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          echo "No requirements file found, skipping pip install"
        fi

    - name: Build WebApp package (zip)
      run: |
        set -e
        zip -r worker_deploy.zip . -x "**/.git/**" "**/__pycache__/**" "**/.venv/**" "*.DS_Store"
        echo "=== ZIP CONTENTS (first 200 lines) ==="
        unzip -l worker_deploy.zip | head -n 200

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App (worker)
      uses: azure/webapps-deploy@v3
      with:
        app-name: "KID-Worker"         # <-- pastikan sama PERSIS dengan nama App Service
        package: "worker_deploy.zip"
