name: Deploy API (KID-BOT-API) - Minimal SP Secret

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: read   # checkout

concurrency:
  group: deploy-api-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy API (single job)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ---- Preflight: pastikan secret ada & JSON valid (camelCase keys) ----
    - name: Preflight - validate AZURE_CREDENTIALS secret
      shell: bash
      env:
        AZ_JSON: ${{ secrets.AZURE_CREDENTIALS }}
      run: |
        set -e
        if [ -z "${AZ_JSON}" ]; then
          echo "::error::Secret AZURE_CREDENTIALS tidak ditemukan atau kosong. Buat di Settings > Secrets > Actions."
          exit 1
        fi
        # install jq utk validasi JSON
        sudo apt-get update -y >/dev/null 2>&1 || true
        sudo apt-get install -y jq >/dev/null 2>&1 || true
        echo "${AZ_JSON}" | jq . >/dev/null 2>&1 || (echo "::error::AZURE_CREDENTIALS bukan JSON valid"; exit 1)
        for key in clientId clientSecret tenantId subscriptionId; do
          echo "${AZ_JSON}" | jq -e --arg k "$key" 'has($k) and (.[$k] != null and .[$k] != "")' >/dev/null 2>&1 \
